/* ═══ HELPERS ═══ */
function playClick(){try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator();const g=c.createGain();o.type='sine';o.frequency.value=600;g.gain.setValueAtTime(0.08,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.08);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.08);}catch(e){}}

function copyToClipboard(text,setCopied){
  navigator.clipboard.writeText(text).then(()=>{setCopied(true);playClick();setTimeout(()=>setCopied(false),1500);}).catch(()=>{});
}

/* ═══ SPLASH ═══ */
function Splash({onDone}){
  const [f,setF]=useState(false);
  useEffect(()=>{const t1=setTimeout(()=>setF(true),1800);const t2=setTimeout(onDone,2300);return()=>{clearTimeout(t1);clearTimeout(t2);};},[]);
  return(
    <div style={{position:'fixed',inset:0,zIndex:9999,background:'linear-gradient(135deg,#0f172a,#1e293b)',
      display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
      animation:f?'splashOut 0.5s ease-in forwards':'none'}}>

      <div style={{fontWeight:900,fontSize:32,color:'#fff',letterSpacing:2,marginTop:12,opacity:0,
        animation:'fadeIn 0.6s ease-out 0.6s forwards'}}>ConvertPro</div>
      <div style={{fontSize:11,color:'rgba(255,255,255,0.3)',letterSpacing:4,marginTop:6,opacity:0,
        animation:'fadeIn 0.4s ease-out 1s forwards'}}>UNIVERSAL CONVERTER</div>

}

/* ═══ CALCULATOR ═══ */
function Calculator({dark}){
  const [display,setDisplay]=useState('0');
  const [history,setHistory]=useState(()=>{try{return JSON.parse(localStorage.getItem('calc_history'))||[];}catch(e){return[];}});
  const [mem,setMem]=useState(0);

  useEffect(()=>{localStorage.setItem('calc_history',JSON.stringify(history.slice(-20)));},[history]);

  const input=(v)=>{playClick();setDisplay(d=>d==='0'||d==='Error'?v:d+v);};
  const clear=()=>{playClick();setDisplay('0');};
  const backspace=()=>{playClick();setDisplay(d=>d.length<=1?'0':d.slice(0,-1));};
  const calculate=()=>{
    playClick();
    try{
      let expr=display.replace(/×/g,'*').replace(/÷/g,'/').replace(/π/g,'Math.PI').replace(/e(?![x])/g,'Math.E');
      expr=expr.replace(/sin\(/g,'Math.sin(').replace(/cos\(/g,'Math.cos(').replace(/tan\(/g,'Math.tan(');
      expr=expr.replace(/log\(/g,'Math.log10(').replace(/ln\(/g,'Math.log(').replace(/√\(/g,'Math.sqrt(');
      expr=expr.replace(/\^/g,'**');
      const result=Function('"use strict";return('+expr+')')();
      if(isNaN(result)||!isFinite(result)){setDisplay('Error');return;}
      const res=parseFloat(result.toPrecision(12)).toString();
      setHistory(h=>[{expr:display,result:res},...h].slice(0,20));
      setDisplay(res);
    }catch(e){setDisplay('Error');}
  };

  const bg=dark?'rgba(30,41,59,0.7)':'rgba(255,255,255,0.9)';
  const btnBg=dark?'rgba(51,65,85,0.6)':'rgba(241,245,249,0.9)';
  const btnOp=dark?'rgba(59,130,246,0.2)':'rgba(59,130,246,0.1)';
  const txt=dark?'#e2e8f0':'#1e293b';
  const dim=dark?'rgba(255,255,255,0.4)':'rgba(0,0,0,0.4)';

  const Btn=({v,display:d,onClick,span=1,bg:b,color:c})=>(
    <button onClick={onClick||(() =>input(d||v))} style={{
      gridColumn:`span ${span}`,padding:'14px 0',borderRadius:12,border:'none',cursor:'pointer',
      background:b||btnBg,color:c||txt,fontSize:18,fontWeight:600,fontFamily:'Inter',
      transition:'transform 0.1s',backdropFilter:'blur(8px)'
    }} onMouseDown={e=>e.currentTarget.style.transform='scale(0.93)'}
       onMouseUp={e=>e.currentTarget.style.transform='scale(1)'}>{v}</button>
  );

  return(
    <div className="slide-up" style={{maxWidth:400,margin:'0 auto'}}>
      {/* Display */}
      <div style={{background:bg,borderRadius:20,padding:'16px 20px',marginBottom:12,backdropFilter:'blur(12px)',border:'1px solid rgba(255,255,255,0.06)'}}>
        <div className="mono" style={{fontSize:13,color:dim,textAlign:'right',minHeight:18,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
          {display!=='0'&&display!=='Error'?'':'​'}
        </div>
        <div className="mono" style={{fontSize:36,fontWeight:700,color:txt,textAlign:'right',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',lineHeight:1.2}}>
          {display}
        </div>
      </div>

      {/* Scientific row */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:6,marginBottom:6}}>
        {['sin(','cos(','tan(','log(','ln(','√('].map(v=>
          <Btn key={v} v={v.replace('(','​')} display={v} bg={btnOp} color="#3b82f6"/>
        )}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(6,1fr)',gap:6,marginBottom:8}}>
        {['π','e','^','(',')','%'].map(v=>
          <Btn key={v} v={v} bg={btnOp} color="#3b82f6"/>
        )}
      </div>

      {/* Main grid */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6}}>
        <Btn v="C" onClick={clear} bg="rgba(239,68,68,0.15)" color="#ef4444"/>
        <Btn v="⌫" onClick={backspace} bg="rgba(239,68,68,0.1)" color="#f87171"/>
        <Btn v="÷"/>
        <Btn v="×"/>
        {['7','8','9','-','4','5','6','+','1','2','3'].map(v=>
          <Btn key={v} v={v} bg={['+','-'].includes(v)?btnOp:undefined} color={['+','-'].includes(v)?'#3b82f6':undefined}/>
        )}
        <Btn v="=" onClick={calculate} bg="linear-gradient(135deg,#3b82f6,#2563eb)" color="#fff"/>
        <Btn v="0" span={2}/>
        <Btn v="."/>
      </div>

      {/* History */}
      {history.length>0&&(
        <div style={{marginTop:16,background:bg,borderRadius:16,padding:14,backdropFilter:'blur(12px)',border:'1px solid rgba(255,255,255,0.06)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <span style={{fontSize:12,fontWeight:700,color:dim}}>History</span>
            <button onClick={()=>setHistory([])} style={{fontSize:10,color:'#ef4444',background:'none',border:'none',cursor:'pointer',fontFamily:'Inter'}}>Clear</button>
          </div>
          <div style={{maxHeight:150,overflowY:'auto'}}>
            {history.slice(0,8).map((h,i)=>(
              <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',borderBottom:'1px solid rgba(255,255,255,0.04)',fontSize:12}}>
                <span className="mono" style={{color:dim,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',flex:1,marginRight:8}}>{h.expr}</span>
                <span className="mono" style={{fontWeight:600,color:txt,cursor:'pointer'}} onClick={()=>{setDisplay(h.result);playClick();}}>= {h.result}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ═══ GENERIC UNIT CONVERTER ═══ */
function UnitConverter({title,units,dark,addToRecent}){
  const keys=Object.keys(units);
  const [from,setFrom]=useState(keys[0]);
  const [to,setTo]=useState(keys[1]);
  const [val,setVal]=useState('');
  const [copied,setCopied]=useState(false);

  const result=useMemo(()=>{
    if(!val||isNaN(val))return '';
    const base=parseFloat(val)*units[from];
    return parseFloat((base/units[to]).toPrecision(10)).toString();
  },[val,from,to]);

  useEffect(()=>{
    if(result&&val){addToRecent({type:title,from:`${val} ${from}`,to:`${result} ${to}`});}
  },[result]);

  const swap=()=>{playClick();setFrom(to);setTo(from);};

  const bg=dark?'rgba(30,41,59,0.6)':'rgba(255,255,255,0.9)';
  const txt=dark?'#e2e8f0':'#1e293b';
  const dim=dark?'rgba(255,255,255,0.4)':'rgba(0,0,0,0.4)';
  const inputBg=dark?'rgba(15,23,42,0.6)':'rgba(241,245,249,0.9)';
  const selBg=dark?'rgba(51,65,85,0.8)':'#f1f5f9';

  return(
    <div className="slide-up" style={{maxWidth:440,margin:'0 auto'}}>
      <div style={{background:bg,borderRadius:20,padding:20,backdropFilter:'blur(12px)',border:'1px solid rgba(255,255,255,0.06)'}}>
        {/* From */}
        <div style={{marginBottom:12}}>
          <label style={{fontSize:10,fontWeight:700,color:dim,letterSpacing:1,display:'block',marginBottom:6}}>FROM</label>
          <select value={from} onChange={e=>{setFrom(e.target.value);playClick();}}
            style={{width:'100%',padding:'10px 30px 10px 12px',borderRadius:10,border:'1px solid rgba(255,255,255,0.08)',background:selBg,color:txt,fontSize:14,fontWeight:600,fontFamily:'Inter',cursor:'pointer',marginBottom:8}}>
            {keys.map(k=><option key={k} value={k}>{k}</option>)}
          </select>
          <input type="number" value={val} onChange={e=>setVal(e.target.value)} placeholder="Enter value"
            style={{width:'100%',padding:'14px 16px',borderRadius:12,border:'1px solid rgba(255,255,255,0.08)',background:inputBg,color:txt,fontSize:24,fontWeight:700,fontFamily:'JetBrains Mono',outline:'none'}}
            autoFocus/>
        </div>

        {/* Swap */}
        <div style={{textAlign:'center',margin:'4px 0'}}>
          <button onClick={swap} style={{width:40,height:40,borderRadius:12,border:'none',cursor:'pointer',
            background:'linear-gradient(135deg,#3b82f6,#2563eb)',color:'#fff',fontSize:18,
            display:'inline-flex',alignItems:'center',justifyContent:'center',transition:'transform 0.15s'}}
            onMouseDown={e=>e.currentTarget.style.transform='scale(0.9) rotate(180deg)'}
            onMouseUp={e=>e.currentTarget.style.transform='scale(1) rotate(0deg)'}>⇅</button>
        </div>

        {/* To */}
        <div style={{marginTop:8}}>
          <label style={{fontSize:10,fontWeight:700,color:dim,letterSpacing:1,display:'block',marginBottom:6}}>TO</label>
          <select value={to} onChange={e=>{setTo(e.target.value);playClick();}}
            style={{width:'100%',padding:'10px 30px 10px 12px',borderRadius:10,border:'1px solid rgba(255,255,255,0.08)',background:selBg,color:txt,fontSize:14,fontWeight:600,fontFamily:'Inter',cursor:'pointer',marginBottom:8}}>
            {keys.map(k=><option key={k} value={k}>{k}</option>)}
          </select>
          <div style={{position:'relative'}}>
            <div className="mono" style={{width:'100%',padding:'14px 50px 14px 16px',borderRadius:12,
              background:result?'rgba(59,130,246,0.08)':inputBg,
              border:`1px solid ${result?'rgba(59,130,246,0.2)':'rgba(255,255,255,0.08)'}`,
              color:result?'#3b82f6':dim,fontSize:24,fontWeight:700,minHeight:56,
              transition:'all 0.3s'}}>
              {result||'—'}
            </div>
            {result&&(
              <button onClick={()=>copyToClipboard(result,setCopied)} style={{
                position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',
                width:32,height:32,borderRadius:8,border:'none',cursor:'pointer',
                background:copied?'#22c55e':'rgba(59,130,246,0.15)',color:copied?'#fff':'#3b82f6',
                fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.2s',
                animation:copied?'copied 0.3s ease-out':'none'
              }}>{copied?'✓':'📋'}</button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══ CURRENCY CONVERTER ═══ */
function CurrencyConverter({dark,addToRecent}){
  const [rates,setRates]=useState(()=>{
    try{const c=JSON.parse(localStorage.getItem('fx_rates'));if(c&&Date.now()-c.ts<86400000)return c.rates;}catch(e){}
    return null;
  });
  const [from,setFrom]=useState('USD');
  const [to,setTo]=useState('EUR');
  const [val,setVal]=useState('');
  const [copied,setCopied]=useState(false);

  // Try fetch rates
  useEffect(()=>{
    if(rates)return;
    fetch('https://open.er-api.com/v6/latest/USD').then(r=>r.json()).then(d=>{
      if(d.rates){
        localStorage.setItem('fx_rates',JSON.stringify({ts:Date.now(),rates:d.rates}));
        setRates(d.rates);
      }
    }).catch(()=>{});
  },[]);

  const getRate=(code)=>{
    if(rates&&rates[code])return rates[code];
    return CURRENCIES[code]?.rate||1;
  };

  const result=useMemo(()=>{
    if(!val||isNaN(val))return '';
    const inUSD=parseFloat(val)/getRate(from);
    const out=inUSD*getRate(to);
    return out.toFixed(2);
  },[val,from,to,rates]);

  useEffect(()=>{if(result&&val)addToRecent({type:'Currency',from:`${val} ${from}`,to:`${result} ${to}`});},[result]);

  const swap=()=>{playClick();setFrom(to);setTo(from);};
  const codes=Object.keys(CURRENCIES).sort();
  const bg=dark?'rgba(30,41,59,0.6)':'rgba(255,255,255,0.9)';
  const txt=dark?'#e2e8f0':'#1e293b';
  const dim=dark?'rgba(255,255,255,0.4)':'rgba(0,0,0,0.4)';
  const inputBg=dark?'rgba(15,23,42,0.6)':'rgba(241,245,249,0.9)';
  const selBg=dark?'rgba(51,65,85,0.8)':'#f1f5f9';

  return(
    <div className="slide-up" style={{maxWidth:440,margin:'0 auto'}}>
      <div style={{background:bg,borderRadius:20,padding:20,backdropFilter:'blur(12px)',border:'1px solid rgba(255,255,255,0.06)'}}>
        {!rates&&<div style={{fontSize:10,color:'#f59e0b',textAlign:'center',marginBottom:8}}>⚠️ Using offline rates — connect for live data</div>}

        <div style={{marginBottom:12}}>
          <label style={{fontSize:10,fontWeight:700,color:dim,letterSpacing:1,display:'block',marginBottom:6}}>FROM</label>
          <select value={from} onChange={e=>{setFrom(e.target.value);playClick();}}
            style={{width:'100%',padding:'10px 30px 10px 12px',borderRadius:10,border:'1px solid rgba(255,255,255,0.08)',background:selBg,color:txt,fontSize:13,fontWeight:600,fontFamily:'Inter',cursor:'pointer',marginBottom:8}}>
            {codes.map(c=><option key={c} value={c}>{CURRENCIES[c].symbol} {c} — {CURRENCIES[c].name}</option>)}
          </select>
          <input type="number" value={val} onChange={e=>setVal(e.target.value)} placeholder="Amount"
            style={{width:'100%',padding:'14px 16px',borderRadius:12,border:'1px solid rgba(255,255,255,0.08)',background:inputBg,color:txt,fontSize:24,fontWeight:700,fontFamily:'JetBrains Mono',outline:'none'}}/>
        </div>

        <div style={{textAlign:'center',margin:'4px 0'}}>
          <button onClick={swap} style={{width:40,height:40,borderRadius:12,border:'none',cursor:'pointer',
            background:'linear-gradient(135deg,#3b82f6,#2563eb)',color:'#fff',fontSize:18,
            display:'inline-flex',alignItems:'center',justifyContent:'center'}}
            onMouseDown={e=>e.currentTarget.style.transform='scale(0.9) rotate(180deg)'}
            onMouseUp={e=>e.currentTarget.style.transform='scale(1)'}>⇅</button>
        </div>

        <div style={{marginTop:8}}>
          <label style={{fontSize:10,fontWeight:700,color:dim,letterSpacing:1,display:'block',marginBottom:6}}>TO</label>
          <select value={to} onChange={e=>{setTo(e.target.value);playClick();}}
            style={{width:'100%',padding:'10px 30px 10px 12px',borderRadius:10,border:'1px solid rgba(255,255,255,0.08)',background:selBg,color:txt,fontSize:13,fontWeight:600,fontFamily:'Inter',cursor:'pointer',marginBottom:8}}>
            {codes.map(c=><option key={c} value={c}>{CURRENCIES[c].symbol} {c} — {CURRENCIES[c].name}</option>)}
          </select>
          <div style={{position:'relative'}}>
            <div className="mono" style={{padding:'14px 50px 14px 16px',borderRadius:12,
              background:result?'rgba(59,130,246,0.08)':inputBg,
              border:`1px solid ${result?'rgba(59,130,246,0.2)':'rgba(255,255,255,0.08)'}`,
              color:result?'#3b82f6':dim,fontSize:24,fontWeight:700,minHeight:56}}>
              {result?`${CURRENCIES[to].symbol} ${parseFloat(result).toLocaleString('en',{minimumFractionDigits:2})}`:'—'}
            </div>
            {result&&(
              <button onClick={()=>copyToClipboard(result,setCopied)} style={{
                position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',
                width:32,height:32,borderRadius:8,border:'none',cursor:'pointer',
                background:copied?'#22c55e':'rgba(59,130,246,0.15)',color:copied?'#fff':'#3b82f6',
                fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',
                animation:copied?'copied 0.3s ease-out':'none'
              }}>{copied?'✓':'📋'}</button>
            )}
          </div>
        </div>

        {val&&result&&<div style={{marginTop:12,textAlign:'center',fontSize:11,color:dim}}>
          1 {from} = {(getRate(to)/getRate(from)).toFixed(4)} {to}
        </div>}
      </div>
    </div>
  );
}

/* ═══ TEMPERATURE ═══ */
function TempConverter({dark,addToRecent}){
  const units=['Celsius','Fahrenheit','Kelvin'];
  const [from,setFrom]=useState('Celsius');
  const [to,setTo]=useState('Fahrenheit');
  const [val,setVal]=useState('');
  const [copied,setCopied]=useState(false);

  const convert=(v,f,t)=>{
    const n=parseFloat(v);if(isNaN(n))return '';
    let c=f==='Celsius'?n:f==='Fahrenheit'?(n-32)*5/9:n-273.15;
    let r=t==='Celsius'?c:t==='Fahrenheit'?c*9/5+32:c+273.15;
    return parseFloat(r.toFixed(4)).toString();
  };

  const result=convert(val,from,to);
  useEffect(()=>{if(result&&val)addToRecent({type:'Temp',from:`${val}° ${from}`,to:`${result}° ${to}`});},[result]);

  const swap=()=>{playClick();setFrom(to);setTo(from);};
  const bg=dark?'rgba(30,41,59,0.6)':'rgba(255,255,255,0.9)';
  const txt=dark?'#e2e8f0':'#1e293b';
  const dim=dark?'rgba(255,255,255,0.4)':'rgba(0,0,0,0.4)';
  const inputBg=dark?'rgba(15,23,42,0.6)':'rgba(241,245,249,0.9)';
  const selBg=dark?'rgba(51,65,85,0.8)':'#f1f5f9';

  return(
    <div className="slide-up" style={{maxWidth:440,margin:'0 auto'}}>
      <div style={{background:bg,borderRadius:20,padding:20,backdropFilter:'blur(12px)',border:'1px solid rgba(255,255,255,0.06)'}}>
        <div style={{marginBottom:12}}>
          <label style={{fontSize:10,fontWeight:700,color:dim,letterSpacing:1,display:'block',marginBottom:6}}>FROM</label>
          <div style={{display:'flex',gap:6,marginBottom:8}}>
            {units.map(u=>(
              <button key={u} onClick={()=>{setFrom(u);playClick();}} style={{flex:1,padding:'10px 0',borderRadius:10,border:'none',cursor:'pointer',
                background:from===u?'linear-gradient(135deg,#3b82f6,#2563eb)':'transparent',
                border:from===u?'none':`1px solid ${dark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.08)'}`,
                color:from===u?'#fff':txt,fontSize:12,fontWeight:600,fontFamily:'Inter'}}>{u}</button>
            ))}
          </div>
          <input type="number" value={val} onChange={e=>setVal(e.target.value)} placeholder="Enter temperature"
            style={{width:'100%',padding:'14px 16px',borderRadius:12,border:'1px solid rgba(255,255,255,0.08)',background:inputBg,color:txt,fontSize:24,fontWeight:700,fontFamily:'JetBrains Mono',outline:'none'}}/>
        </div>
        <div style={{textAlign:'center',margin:'4px 0'}}>
          <button onClick={swap} style={{width:40,height:40,borderRadius:12,border:'none',cursor:'pointer',background:'linear-gradient(135deg,#3b82f6,#2563eb)',color:'#fff',fontSize:18,display:'inline-flex',alignItems:'center',justifyContent:'center'}}>⇅</button>
        </div>
        <div style={{marginTop:8}}>
          <label style={{fontSize:10,fontWeight:700,color:dim,letterSpacing:1,display:'block',marginBottom:6}}>TO</label>
          <div style={{display:'flex',gap:6,marginBottom:8}}>
            {units.map(u=>(
              <button key={u} onClick={()=>{setTo(u);playClick();}} style={{flex:1,padding:'10px 0',borderRadius:10,border:'none',cursor:'pointer',
                background:to===u?'linear-gradient(135deg,#3b82f6,#2563eb)':'transparent',
                border:to===u?'none':`1px solid ${dark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.08)'}`,
                color:to===u?'#fff':txt,fontSize:12,fontWeight:600,fontFamily:'Inter'}}>{u}</button>
            ))}
          </div>
          <div style={{position:'relative'}}>
            <div className="mono" style={{padding:'14px 50px 14px 16px',borderRadius:12,background:result?'rgba(59,130,246,0.08)':inputBg,
              border:`1px solid ${result?'rgba(59,130,246,0.2)':'rgba(255,255,255,0.08)'}`,color:result?'#3b82f6':dim,fontSize:24,fontWeight:700,minHeight:56}}>
              {result?result+'°':'—'}
            </div>
            {result&&<button onClick={()=>copyToClipboard(result,setCopied)} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',width:32,height:32,borderRadius:8,border:'none',cursor:'pointer',background:copied?'#22c55e':'rgba(59,130,246,0.15)',color:copied?'#fff':'#3b82f6',fontSize:14,display:'flex',alignItems:'center',justifyContent:'center'}}>{copied?'✓':'📋'}</button>}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══ COOKING CONVERTER ═══ */
function CookingConverter({dark,addToRecent}){
  const [ingredient,setIngredient]=useState(Object.keys(COOKING_DENSITY)[0]);
  const [fromUnit,setFromUnit]=useState('Cup (US)');
  const [toUnit,setToUnit]=useState('Gram');
  const [val,setVal]=useState('');
  const volumeUnits=Object.keys(VOLUME);

  const result=useMemo(()=>{
    if(!val||isNaN(val))return '';
    const n=parseFloat(val);
    // Convert from -> ml
    const ml=n*(VOLUME[fromUnit]||1);
    // Convert ml -> to
    const out=ml/(VOLUME[toUnit]||1);

    // If converting to/from grams, use density
    if(toUnit==='Gram'||fromUnit==='Gram'){
      const d=COOKING_DENSITY[ingredient];
      if(!d)return out.toFixed(2);
      if(fromUnit==='Cup (US)'&&toUnit==='Gram') return (n*d.cup).toFixed(1);
      if(fromUnit==='Tablespoon'&&toUnit==='Gram') return (n*d.tbsp).toFixed(1);
      if(fromUnit==='Teaspoon'&&toUnit==='Gram') return (n*d.tsp).toFixed(1);
      if(fromUnit==='Gram'&&toUnit==='Cup (US)') return (n/d.cup).toFixed(2);
      if(fromUnit==='Gram'&&toUnit==='Tablespoon') return (n/d.tbsp).toFixed(2);
      if(fromUnit==='Gram'&&toUnit==='Teaspoon') return (n/d.tsp).toFixed(2);
    }
    return parseFloat(out.toPrecision(8)).toString();
  },[val,fromUnit,toUnit,ingredient]);

  const bg=dark?'rgba(30,41,59,0.6)':'rgba(255,255,255,0.9)';
  const txt=dark?'#e2e8f0':'#1e293b';
  const dim=dark?'rgba(255,255,255,0.4)':'rgba(0,0,0,0.4)';
  const inputBg=dark?'rgba(15,23,42,0.6)':'rgba(241,245,249,0.9)';
  const selBg=dark?'rgba(51,65,85,0.8)':'#f1f5f9';
  const allUnits=[...volumeUnits,'Gram'];

  return(
    <div className="slide-up" style={{maxWidth:440,margin:'0 auto'}}>
      <div style={{background:bg,borderRadius:20,padding:20,backdropFilter:'blur(12px)',border:'1px solid rgba(255,255,255,0.06)'}}>
        {/* Ingredient selector */}
        <div style={{marginBottom:14}}>
          <label style={{fontSize:10,fontWeight:700,color:dim,letterSpacing:1,display:'block',marginBottom:6}}>INGREDIENT</label>
          <select value={ingredient} onChange={e=>setIngredient(e.target.value)}
            style={{width:'100%',padding:'10px 30px 10px 12px',borderRadius:10,border:'1px solid rgba(255,255,255,0.08)',background:selBg,color:txt,fontSize:13,fontWeight:600,fontFamily:'Inter',cursor:'pointer'}}>
            {Object.keys(COOKING_DENSITY).map(k=><option key={k} value={k}>{k}</option>)}
          </select>
        </div>

        <div style={{marginBottom:12}}>
          <label style={{fontSize:10,fontWeight:700,color:dim,letterSpacing:1,display:'block',marginBottom:6}}>FROM</label>
          <select value={fromUnit} onChange={e=>{setFromUnit(e.target.value);playClick();}}
            style={{width:'100%',padding:'10px 30px 10px 12px',borderRadius:10,border:'1px solid rgba(255,255,255,0.08)',background:selBg,color:txt,fontSize:13,fontWeight:600,fontFamily:'Inter',cursor:'pointer',marginBottom:8}}>
            {allUnits.map(k=><option key={k} value={k}>{k}</option>)}
          </select>
          <input type="number" value={val} onChange={e=>setVal(e.target.value)} placeholder="Enter amount"
            style={{width:'100%',padding:'14px 16px',borderRadius:12,border:'1px solid rgba(255,255,255,0.08)',background:inputBg,color:txt,fontSize:24,fontWeight:700,fontFamily:'JetBrains Mono',outline:'none'}}/>
        </div>

        <div style={{marginTop:8}}>
          <label style={{fontSize:10,fontWeight:700,color:dim,letterSpacing:1,display:'block',marginBottom:6}}>TO</label>
          <select value={toUnit} onChange={e=>{setToUnit(e.target.value);playClick();}}
            style={{width:'100%',padding:'10px 30px 10px 12px',borderRadius:10,border:'1px solid rgba(255,255,255,0.08)',background:selBg,color:txt,fontSize:13,fontWeight:600,fontFamily:'Inter',cursor:'pointer',marginBottom:8}}>
            {allUnits.map(k=><option key={k} value={k}>{k}</option>)}
          </select>
          <div className="mono" style={{padding:'14px 16px',borderRadius:12,
            background:result?'rgba(59,130,246,0.08)':inputBg,
            border:`1px solid ${result?'rgba(59,130,246,0.2)':'rgba(255,255,255,0.08)'}`,
            color:result?'#3b82f6':dim,fontSize:24,fontWeight:700,minHeight:56}}>
            {result||'—'}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══ APP ═══ */
function App(){
  const [splash,setSplash]=useState(true);
  const [dark,setDark]=useState(true);
  const [tab,setTab]=useState('calc');
  const [recent,setRecent]=useState(()=>{try{return JSON.parse(localStorage.getItem('recent_conv'))||[];}catch(e){return[];}});

  const addToRecent=useCallback((item)=>{
    setRecent(prev=>{const n=[item,...prev.filter(p=>p.from!==item.from||p.to!==item.to)].slice(0,10);localStorage.setItem('recent_conv',JSON.stringify(n));return n;});
  },[]);

  if(splash)return <Splash onDone={()=>setSplash(false)}/>;

  return(
    <div style={{minHeight:'100vh',background:dark?'#0f172a':'#f1f5f9',transition:'background 0.4s',paddingBottom:100}}>
      {/* Header */}
      <header style={{padding:'14px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',
        borderBottom:`1px solid ${dark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)'}`}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:22}}>⚡</span>
          <div>
            <h1 style={{fontSize:18,fontWeight:900,color:dark?'#fff':'#1e293b'}}>ConvertPro</h1>
          </div>
        </div>
        <button onClick={()=>setDark(!dark)} style={{width:40,height:40,borderRadius:12,border:'none',cursor:'pointer',fontSize:18,
          background:dark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)',display:'flex',alignItems:'center',justifyContent:'center'}}>
          {dark?'☀️':'🌙'}
        </button>
      </header>

      {/* Tabs */}
      <div style={{display:'flex',gap:4,padding:'10px 12px',overflowX:'auto',WebkitOverflowScrolling:'touch'}}>
        {TABS.map(t=>(
          <button key={t.key} onClick={()=>{setTab(t.key);playClick();}}
            style={{flex:'0 0 auto',padding:'8px 14px',borderRadius:12,border:'none',cursor:'pointer',
              background:tab===t.key?'linear-gradient(135deg,#3b82f6,#2563eb)':(dark?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.04)'),
              color:tab===t.key?'#fff':(dark?'rgba(255,255,255,0.5)':'#64748b'),
              fontSize:11,fontWeight:600,fontFamily:'Inter',whiteSpace:'nowrap',transition:'all 0.2s',
              display:'flex',alignItems:'center',gap:4}}>
            <span style={{fontSize:14}}>{t.icon}</span>{t.label}
          </button>
        ))}
      </div>

      {/* Content */}
      <div style={{padding:'12px 16px'}}>
        {tab==='calc'&&<Calculator dark={dark}/>}
        {tab==='currency'&&<CurrencyConverter dark={dark} addToRecent={addToRecent}/>}
        {tab==='weight'&&<UnitConverter title="Weight" units={WEIGHT} dark={dark} addToRecent={addToRecent}/>}
        {tab==='distance'&&<UnitConverter title="Distance" units={DISTANCE} dark={dark} addToRecent={addToRecent}/>}
        {tab==='temp'&&<TempConverter dark={dark} addToRecent={addToRecent}/>}
        {tab==='cooking'&&<CookingConverter dark={dark} addToRecent={addToRecent}/>}
      </div>

      {/* Recent conversions */}
      {recent.length>0&&tab!=='calc'&&(
        <div style={{padding:'0 16px',marginTop:8}}>
          <div style={{background:dark?'rgba(30,41,59,0.5)':'rgba(255,255,255,0.8)',borderRadius:16,padding:14,
            backdropFilter:'blur(12px)',border:'1px solid rgba(255,255,255,0.06)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
              <span style={{fontSize:11,fontWeight:700,color:dark?'rgba(255,255,255,0.4)':'#64748b'}}>⏱ Recent</span>
              <button onClick={()=>{setRecent([]);localStorage.removeItem('recent_conv');}} style={{fontSize:9,color:'#ef4444',background:'none',border:'none',cursor:'pointer',fontFamily:'Inter'}}>Clear</button>
            </div>
            {recent.slice(0,5).map((r,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'4px 0',borderBottom:'1px solid rgba(255,255,255,0.03)',fontSize:11}}>
                <span style={{fontSize:8,fontWeight:700,color:'#3b82f6',background:'rgba(59,130,246,0.1)',padding:'2px 6px',borderRadius:4}}>{r.type}</span>
                <span style={{color:dark?'rgba(255,255,255,0.5)':'#64748b'}}>{r.from}</span>
                <span style={{color:dark?'rgba(255,255,255,0.2)':'#cbd5e1'}}>→</span>
                <span className="mono" style={{fontWeight:600,color:dark?'#e2e8f0':'#1e293b'}}>{r.to}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
